name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

jobs:
  frontend-test:
    if: (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')) || github.event_name == 'merge_group'
    runs-on: depot-ubuntu-24.04-8

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./dashboard
        run: pnpm install --frozen-lockfile

      - name: Install just
        uses: extractions/setup-just@v3
        with:
          just-version: "1.46.0"

      - name: Run frontend CI pipeline
        id: ci-step
        run: |
          START_TIME=$(date +%s)
          just ci ts
          END_TIME=$(date +%s)
          CI_DURATION=$((END_TIME - START_TIME))
          echo "ci_duration=$CI_DURATION" >> $GITHUB_OUTPUT
          echo "Frontend CI pipeline completed in ${CI_DURATION}s"

          # Report metrics to Somnial
          curl -X POST "https://charts.somnial.co/doubleword-control-layer/frontend-ci-duration?value=${CI_DURATION}" || true

      - name: Extract frontend coverage metrics
        id: coverage-step
        working-directory: ./dashboard
        run: |
          # Extract coverage from already generated coverage files (from 'just ci ts')
          echo "Checking for coverage files..."
          ls -la coverage/ || echo "Coverage directory not found"

          if [ -f coverage/lcov.info ]; then
            echo "Found lcov.info, extracting coverage..."

            # Parse coverage/lcov.info using awk (clean and always available)
            COVERAGE=$(awk '
              /^LF:/ { lf += $2 }
              /^LH:/ { lh += $2 }
              END {
                if (lf > 0)
                  printf "%.2f", (lh * 100) / lf
                else
                  print "0"
              }
            ' FS=: coverage/lcov.info)

            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            echo "Frontend code coverage: ${COVERAGE}%"

            # Report coverage to Somnial
            curl -X POST "https://charts.somnial.co/doubleword-control-layer/frontend-code-coverage?value=${COVERAGE}" || true
          else
            echo "No coverage report found at coverage/lcov.info - coverage may not have been generated"
            echo "coverage=0" >> $GITHUB_OUTPUT
          fi

      - name: Calculate bundle metrics
        id: build-step
        run: |
          cd dashboard
          # Calculate bundle metrics from the build output
          TOTAL_SIZE=$(find dist -name "*.js" -o -name "*.css" | xargs wc -c | tail -1 | awk '{print $1}')
          GZIPPED_SIZE=$(find dist -name "*.js" -o -name "*.css" | xargs gzip -c | wc -c)

          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT
          echo "gzipped_size=$GZIPPED_SIZE" >> $GITHUB_OUTPUT

          echo "Bundle: ${TOTAL_SIZE} bytes (${GZIPPED_SIZE} gzipped)"

          # Report bundle metrics to Somnial
          curl -X POST "https://charts.somnial.co/doubleword-control-layer/total-bundle-size?value=${TOTAL_SIZE}" || true
          curl -X POST "https://charts.somnial.co/doubleword-control-layer/gzipped-bundle-size?value=${GZIPPED_SIZE}" || true

  backend-crate-test:
    if: (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')) || github.event_name == 'merge_group'
    name: backend-test (${{ matrix.package }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: dwctl
            runner: depot-ubuntu-24.04-16
            database: true
          - package: fusillade
            runner: depot-ubuntu-24.04-8
            database: true
          - package: fusillade-core
            runner: depot-ubuntu-24.04-8
            database: false
          - package: fusillade-arsenal
            runner: depot-ubuntu-24.04-8
            database: true
    runs-on: ${{ matrix.runner }}

    # Postgres is started manually below (not via `services:`) so we can pass
    # `-c max_connections=300`. SQLx tests open their own pools and underway
    # PgListener connections, so the default 100 is insufficient.

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start Postgres
        if: matrix.database
        run: |
          docker run -d --name postgres \
            -e POSTGRES_DB=test \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_HOST_AUTH_METHOD=trust \
            -p 5432:5432 \
            postgres:latest \
            -c max_connections=300
          for _ in $(seq 1 30); do
            docker exec postgres pg_isready -U postgres && break
            sleep 1
          done

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: backend-test-${{ matrix.package }}

      - name: Install just
        uses: extractions/setup-just@v3
        with:
          just-version: "1.46.0"

      - name: Install sqlx-cli and cargo-llvm-cov
        run: |
          cargo install cargo-llvm-cov --locked
          if [[ "${{ matrix.database }}" == "true" ]]; then
            # Pin sqlx-cli to the 0.8.x line to match the library version.
            cargo install sqlx-cli --version '^0.8' --no-default-features --features native-tls,postgres --locked
          fi

      - name: Set up test databases
        if: matrix.database
        env:
          DB_PASS: postgres
        run: just db-setup

      - name: Compile and test ${{ matrix.package }}
        run: |
          START_TIME=$(date +%s)
          cargo llvm-cov --package "${{ matrix.package }}" \
            --lcov \
            --output-path "lcov-${{ matrix.package }}.info"
          END_TIME=$(date +%s)
          CI_DURATION=$((END_TIME - START_TIME))
          echo "${{ matrix.package }} tests completed in ${CI_DURATION}s"
          curl -X POST \
            "https://charts.somnial.co/doubleword-control-layer/backend-${{ matrix.package }}-ci-duration?value=${CI_DURATION}" || true

      - name: Upload ${{ matrix.package }} coverage
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-${{ matrix.package }}
          path: lcov-${{ matrix.package }}.info
          if-no-files-found: error
          retention-days: 1

  backend-lint:
    if: (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')) || github.event_name == 'merge_group'
    runs-on: depot-ubuntu-24.04-16

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start Postgres
        run: |
          docker run -d --name postgres \
            -e POSTGRES_DB=test \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_HOST_AUTH_METHOD=trust \
            -p 5432:5432 \
            postgres:latest \
            -c max_connections=300
          for _ in $(seq 1 30); do
            docker exec postgres pg_isready -U postgres && break
            sleep 1
          done

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: backend-lint

      - name: Install just
        uses: extractions/setup-just@v3
        with:
          just-version: "1.46.0"

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version '^0.8' --no-default-features --features native-tls,postgres --locked

      - name: Set up test databases
        env:
          DB_PASS: postgres
        run: just db-setup

      - name: Lint Rust workspace
        run: just lint rust -- -D warnings

  backend-test:
    if: always() && ((github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')) || github.event_name == 'merge_group')
    needs: [backend-crate-test, backend-lint]
    runs-on: ubuntu-latest
    name: backend-test
    env:
      MINIMUM_COVERAGE: "60"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Require crate tests and lint
        env:
          CRATE_TEST_RESULT: ${{ needs.backend-crate-test.result }}
          LINT_RESULT: ${{ needs.backend-lint.result }}
        run: |
          if [[ "$CRATE_TEST_RESULT" != "success" ]]; then
            echo "One or more crate test jobs failed: $CRATE_TEST_RESULT" >&2
            exit 1
          fi
          if [[ "$LINT_RESULT" != "success" ]]; then
            echo "Rust workspace lint failed: $LINT_RESULT" >&2
            exit 1
          fi

      - name: Download per-crate coverage
        uses: actions/download-artifact@v4
        with:
          pattern: rust-coverage-*
          path: rust-coverage
          merge-multiple: true

      - name: Aggregate backend coverage
        id: coverage-step
        run: |
          shopt -s nullglob
          coverage_files=(rust-coverage/*.info)
          if (( ${#coverage_files[@]} != 4 )); then
            echo "Expected 4 coverage files, found ${#coverage_files[@]}" >&2
            exit 1
          fi

          .github/scripts/aggregate-rust-coverage.py \
            --minimum "$MINIMUM_COVERAGE" \
            "${coverage_files[@]}" | tee coverage-summary.txt

          COVERAGE=$(awk -F= '/^coverage=/ { print $2 }' coverage-summary.txt)
          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Backend code coverage: ${COVERAGE}%"
          curl -X POST \
            "https://charts.somnial.co/doubleword-control-layer/backend-code-coverage?value=${COVERAGE}" || true

  build:
    if: (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')) || github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch'
    runs-on: depot-ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_PR_HEAD_SHA: true
        with:
          images: ghcr.io/doublewordai/control-layer
          sep-tags: "\n"
          tags: |
            type=sha,prefix=sha-
            type=raw,value=manual,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push all images
        id: build-step
        run: |
          START_TIME=$(date +%s)
          echo "start_time=$START_TIME" >> $GITHUB_OUTPUT
          echo "Starting Docker build at $(date)"

      - name: Build and push with Depot
        uses: depot/build-push-action@v1
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          sbom: true
          provenance: true

      - name: Record build time
        id: build-time-step
        run: |
          END_TIME=$(date +%s)
          BUILD_DURATION=$((END_TIME - ${{ steps.build-step.outputs.start_time }}))
          echo "build_duration=$BUILD_DURATION" >> $GITHUB_OUTPUT
          echo "Docker build completed in ${BUILD_DURATION}s"

          # Report build time to Somnial
          curl -X POST "https://charts.somnial.co/doubleword-control-layer/docker-build-duration?value=${BUILD_DURATION}" || true

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

  openresponses-compliance:
    if: (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')) || github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build
    name: Open Responses Compliance

    permissions:
      contents: read
      packages: read

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: dwctl
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 1s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dwctl
      TEST_API_KEY: sk-openresponses-compliance
      TEST_MODEL: gemini-2.5-flash
      # Run currently supported HTTP /responses tests. Remove this filter once
      # WebSocket transport (#1178) and /responses/compact (#1179) are supported.
      OPENRESPONSES_COMPLIANCE_FILTER: basic-response,assistant-phase,response-output-phase-schema,streaming-response,system-prompt,tool-calling,image-input,multi-turn

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Select built image
        id: image
        run: |
          IMAGE_LIST="${{ needs.build.outputs.image-tag }}"
          IMAGE=$(echo "$IMAGE_LIST" | head -n1)
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Using image: $IMAGE"

      - name: Write config
        run: |
          cat > /tmp/dwctl-openresponses-compliance.yaml <<EOF
          host: "0.0.0.0"
          port: 3001
          dashboard_url: "http://localhost:3001"
          admin_email: "test@doubleword.ai"
          admin_password: "hunter2"
          secret_key: "insecure-openresponses-compliance"
          enable_metrics: false
          enable_request_logging: false
          database:
            type: external
            url: "$DATABASE_URL"
          auth:
            native:
              enabled: true
              allow_registration: false
            proxy_header:
              enabled: false
          batches:
            enabled: false
          background_services:
            batch_daemon:
              enabled: never
            leader_election:
              enabled: false
            probe_scheduler:
              enabled: false
            notifications:
              enabled: false
              webhooks:
                enabled: false
            sync_workers:
              enabled: false
          onwards:
            strict_mode: true
          EOF

      - name: Validate Gemini upstream
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY repository secret is required for Open Responses compliance"
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            --request POST \
            --url https://generativelanguage.googleapis.com/v1beta/openai/chat/completions \
            --header "Authorization: Bearer ${GEMINI_API_KEY}" \
            --header "Content-Type: application/json" \
            --data @- <<JSON
          {
            "model": "${TEST_MODEL}",
            "messages": [
              {
                "role": "user",
                "content": "Reply with ok."
              }
            ],
            "max_tokens": 4
          }
          JSON

      - name: Start dwctl
        run: |
          docker run \
            --detach \
            --name dwctl-openresponses-compliance \
            --network host \
            --volume /tmp/dwctl-openresponses-compliance.yaml:/app/config.yaml:ro \
            "${{ steps.image.outputs.image }}" \
            --config /app/config.yaml

          for attempt in $(seq 1 60); do
            if curl -sf http://localhost:3001/healthz > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting for dwctl (${attempt}/60)"
            sleep 1
          done
          echo "Server failed to start"
          docker logs dwctl-openresponses-compliance
          exit 1

      - name: Seed compliance fixture
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY repository secret is required for Open Responses compliance"
            exit 1
          fi

          psql \
            -v ON_ERROR_STOP=1 \
            -v gemini_api_key="${GEMINI_API_KEY}" \
            -v test_api_key="${TEST_API_KEY}" \
            -v test_model="${TEST_MODEL}" \
            "$DATABASE_URL" <<'SQL'
          INSERT INTO users (id, username, email, display_name, auth_source, verified)
          VALUES (
            '10000000-0000-0000-0000-000000000001',
            'openresponses-compliance',
            'openresponses-compliance@doubleword.ai',
            'Open Responses Compliance',
            'ci',
            true
          )
          ON CONFLICT (id) DO UPDATE SET verified = EXCLUDED.verified;

          INSERT INTO inference_endpoints (id, name, description, url, api_key, created_by)
          VALUES (
            '10000000-0000-0000-0000-000000000002',
            'gemini-compliance',
            'Gemini endpoint for Open Responses adapter compliance tests',
            'https://generativelanguage.googleapis.com/v1beta/openai/',
            :'gemini_api_key',
            '10000000-0000-0000-0000-000000000001'
          )
          ON CONFLICT (id) DO UPDATE SET
            url = EXCLUDED.url,
            api_key = EXCLUDED.api_key,
            updated_at = NOW();

          INSERT INTO deployed_models (
            id,
            model_name,
            alias,
            description,
            type,
            capabilities,
            created_by,
            hosted_on,
            trusted,
            open_responses_adapter
          )
          VALUES (
            '10000000-0000-0000-0000-000000000003',
            :'test_model',
            :'test_model',
            'Open Responses adapter compliance model',
            'standard',
            ARRAY['chat'],
            '10000000-0000-0000-0000-000000000001',
            '10000000-0000-0000-0000-000000000002',
            true,
            true
          )
          ON CONFLICT (id) DO UPDATE SET
            model_name = EXCLUDED.model_name,
            alias = EXCLUDED.alias,
            hosted_on = EXCLUDED.hosted_on,
            trusted = EXCLUDED.trusted,
            open_responses_adapter = EXCLUDED.open_responses_adapter,
            deleted = FALSE,
            updated_at = NOW();

          INSERT INTO deployment_groups (deployment_id, group_id, granted_by)
          VALUES (
            '10000000-0000-0000-0000-000000000003',
            '00000000-0000-0000-0000-000000000000',
            '10000000-0000-0000-0000-000000000001'
          )
          ON CONFLICT (deployment_id, group_id) DO NOTHING;

          INSERT INTO api_keys (
            id,
            name,
            description,
            secret,
            purpose,
            user_id,
            created_by,
            requests_per_second,
            burst_size
          )
          VALUES (
            '10000000-0000-0000-0000-000000000004',
            'Open Responses compliance key',
            'Realtime key for Open Responses compliance tests',
            :'test_api_key',
            'realtime',
            '10000000-0000-0000-0000-000000000001',
            '10000000-0000-0000-0000-000000000001',
            100,
            200
          )
          ON CONFLICT (id) DO UPDATE SET
            secret = EXCLUDED.secret,
            purpose = EXCLUDED.purpose,
            requests_per_second = EXCLUDED.requests_per_second,
            burst_size = EXCLUDED.burst_size,
            is_deleted = FALSE;

          INSERT INTO credits_transactions (
            user_id,
            transaction_type,
            amount,
            source_id,
            description
          )
          VALUES (
            '10000000-0000-0000-0000-000000000001',
            'admin_grant',
            1000,
            'openresponses-compliance-credit',
            'Credits for Open Responses compliance tests'
          )
          ON CONFLICT (source_id) DO NOTHING;

          SELECT pg_sleep(0.2);
          SELECT pg_notify(
            'auth_config_changed',
            'openresponses_compliance:' || (extract(epoch FROM clock_timestamp()) * 1000000)::bigint::text
          );
          SQL

      - name: Wait for compliance fixture
        run: |
          for attempt in $(seq 1 30); do
            models_response=$(curl -sf \
              -H "Authorization: Bearer ${TEST_API_KEY}" \
              http://localhost:3001/ai/v1/models 2>/dev/null || true)
            if echo "$models_response" | jq -e --arg model "${TEST_MODEL}" '.data[]? | select(.id == $model)' > /dev/null; then
              echo "Compliance fixture is ready"
              exit 0
            fi
            echo "Waiting for compliance fixture (${attempt}/30)"
            sleep 1
          done
          echo "Compliance fixture did not become available"
          echo "Latest /models response:"
          curl -sS -H "Authorization: Bearer ${TEST_API_KEY}" http://localhost:3001/ai/v1/models || true
          echo
          echo "Fixture database state:"
          psql "$DATABASE_URL" <<SQL
          WITH user_balances AS (
            SELECT
              u.id AS user_id,
              COALESCE(c.balance, 0) + COALESCE(
                (
                  SELECT SUM(
                    CASE WHEN ct.transaction_type IN ('purchase', 'admin_grant')
                    THEN ct.amount ELSE -ct.amount END
                  )
                  FROM credits_transactions ct
                  WHERE ct.user_id = u.id
                    AND ct.seq > COALESCE(c.checkpoint_seq, 0)
                ),
                0
              ) AS balance
            FROM users u
            LEFT JOIN user_balance_checkpoints c ON c.user_id = u.id
          )
          SELECT
            dm.alias,
            dg.group_id,
            ak.secret,
            ub.balance
          FROM deployed_models dm
          LEFT JOIN deployment_groups dg ON dg.deployment_id = dm.id
          LEFT JOIN api_keys ak ON ak.user_id = '10000000-0000-0000-0000-000000000001'
          LEFT JOIN user_balances ub ON ub.user_id = ak.user_id
          WHERE dm.id = '10000000-0000-0000-0000-000000000003';
          SQL
          docker logs dwctl-openresponses-compliance
          exit 1

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Clone openresponses
        # Track upstream main so CI surfaces newly added compliance coverage.
        run: |
          git clone --depth 1 https://github.com/openresponses/openresponses /tmp/openresponses
          cd /tmp/openresponses
          echo "Open Responses commit: $(git rev-parse HEAD)"
          git log -1 --oneline

      - name: Install openresponses dependencies
        run: cd /tmp/openresponses && bun install

      - name: Run compliance tests
        run: |
          cd /tmp/openresponses
          echo "Open Responses commit: $(git rev-parse HEAD)"
          echo "Base URL: http://localhost:3001/ai/v1"
          echo "Model: ${TEST_MODEL}"
          echo "Filter: ${OPENRESPONSES_COMPLIANCE_FILTER}"
          echo

          set +e
          bun run bin/compliance-test.ts \
            --base-url http://localhost:3001/ai/v1 \
            --api-key "${TEST_API_KEY}" \
            --model "${TEST_MODEL}" \
            --filter "${OPENRESPONSES_COMPLIANCE_FILTER}" \
            --json > /tmp/openresponses-compliance-results.json
          status=$?
          set -e

          if ! jq -e . /tmp/openresponses-compliance-results.json > /dev/null; then
            echo "Compliance runner did not emit valid JSON. Raw output:"
            cat /tmp/openresponses-compliance-results.json
            exit "$status"
          fi

          echo "=== Open Responses compliance summary ==="
          jq -r '
            .results[] | "\(.status | ascii_upcase): \(.name)"
          ' /tmp/openresponses-compliance-results.json
          jq -r '
            .results[]
            | select(.status == "failed")
            | "\n\(.name):\n" + ((.errors // []) | map("  - " + .) | join("\n"))
          ' /tmp/openresponses-compliance-results.json
          jq -r '
            "Results: \(.summary.passed) passed, \(.summary.failed) failed, \(.summary.skipped) skipped, \(.summary.total) total"
          ' /tmp/openresponses-compliance-results.json

          if [ "$status" -ne 0 ]; then
            echo
            echo "=== Failed result payloads ==="
            jq '
              .results[]
              | select(.status == "failed")
            ' /tmp/openresponses-compliance-results.json

            failed_filters=$(
              jq -r '
                .results[]
                | select(.status == "failed")
                | .id
              ' /tmp/openresponses-compliance-results.json | paste -sd, -
            )

            retry_status=$status
            if [ -n "$failed_filters" ]; then
              echo
              echo "=== Retry failed test(s): ${failed_filters} ==="
              set +e
              bun run bin/compliance-test.ts \
                --base-url http://localhost:3001/ai/v1 \
                --api-key "${TEST_API_KEY}" \
                --model "${TEST_MODEL}" \
                --filter "${failed_filters}" \
                --json > /tmp/openresponses-compliance-retry-results.json
              retry_status=$?
              set -e

              if jq -e . /tmp/openresponses-compliance-retry-results.json > /dev/null; then
                jq -r '
                  .results[] | "RETRY \(.status | ascii_upcase): \(.name)"
                ' /tmp/openresponses-compliance-retry-results.json
                jq -r '
                  .results[]
                  | select(.status == "failed")
                  | "\nRetry \(.name):\n" + ((.errors // []) | map("  - " + .) | join("\n"))
                ' /tmp/openresponses-compliance-retry-results.json
                jq -r '
                  "Retry results: \(.summary.passed) passed, \(.summary.failed) failed, \(.summary.skipped) skipped, \(.summary.total) total"
                ' /tmp/openresponses-compliance-retry-results.json
              else
                echo "Compliance retry did not emit valid JSON. Raw output:"
                cat /tmp/openresponses-compliance-retry-results.json
              fi

              if [ "$retry_status" -eq 0 ]; then
                echo
                echo "Failed test(s) passed on retry; treating as transient provider flake."
                status=0
              else
                echo
                echo "=== Verbose rerun of failed test(s): ${failed_filters} ==="
                bun run bin/compliance-test.ts \
                  --base-url http://localhost:3001/ai/v1 \
                  --api-key "${TEST_API_KEY}" \
                  --model "${TEST_MODEL}" \
                  --filter "${failed_filters}" \
                  --verbose || true
              fi
            fi

            if [ "$status" -ne 0 ]; then
              echo
              echo "=== Current /models response ==="
              curl -sS \
                -H "Authorization: Bearer ${TEST_API_KEY}" \
                http://localhost:3001/ai/v1/models | jq . || true

              echo
              echo "=== Compliance fixture database state ==="
              psql "$DATABASE_URL" -c "
                SELECT
                  dm.alias,
                  dm.model_name,
                  dm.open_responses_adapter,
                  dm.trusted,
                  dm.deleted,
                  ie.url AS endpoint_url,
                  dg.group_id,
                  ak.purpose,
                  ak.is_deleted AS api_key_deleted
                FROM deployed_models dm
                LEFT JOIN inference_endpoints ie ON ie.id = dm.hosted_on
                LEFT JOIN deployment_groups dg ON dg.deployment_id = dm.id
                LEFT JOIN api_keys ak ON ak.user_id = '10000000-0000-0000-0000-000000000001'
                WHERE dm.id = '10000000-0000-0000-0000-000000000003';
              "
            fi
          fi

          exit "$status"

      - name: Show dwctl logs
        if: always()
        run: |
          echo "=== dwctl Server Logs ==="
          docker logs dwctl-openresponses-compliance 2>&1 | tee /tmp/dwctl-openresponses-compliance.log || echo "No dwctl container found"

      - name: Upload Open Responses compliance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openresponses-compliance-results
          path: |
            /tmp/openresponses-compliance-results.json
            /tmp/openresponses-compliance-retry-results.json
            /tmp/dwctl-openresponses-compliance.log
          if-no-files-found: ignore

      - name: Stop dwctl
        if: always()
        run: docker rm -f dwctl-openresponses-compliance || true

  security-scan:
    if: (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')) || github.event_name == 'merge_group'
    runs-on: depot-ubuntu-24.04
    needs: build

    permissions:
      contents: read
      packages: read
      security-events: write # For uploading SARIF results

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Grype
        run: |
          curl -sSfL https://get.anchore.io/grype | sudo sh -s -- -b /usr/local/bin
          grype version

      - name: Security scan with Grype
        id: security-scan
        run: |
          # Define image tags using the built images
          TAG_LIST="${{ needs.build.outputs.image-tag }}"
          # Extract just the SHA tag for our scan
          TAG=$(echo "$TAG_LIST" | head -n1 | cut -d':' -f2)

          CONTROL_LAYER_TAG="ghcr.io/doublewordai/control-layer:$TAG"

          echo "Scanning images for security vulnerabilities..."
          echo "Tag: $TAG"

          # Parse results and calculate metrics
          calculate_vulns() {
            local file=$1
            local severity=$2
            jq -r --arg sev "$severity" '[.matches[] | select(.vulnerability.severity == $sev)] | length' "$file"
          }

          # Scan control-layer image
          echo "Scanning control-layer image: $CONTROL_LAYER_TAG"
          grype "$CONTROL_LAYER_TAG" --output json --file control-layer-vulnerabilities.json
          CONTROL_LAYER_CRITICAL=$(calculate_vulns control-layer-vulnerabilities.json "Critical")
          CONTROL_LAYER_HIGH=$(calculate_vulns control-layer-vulnerabilities.json "High")

          # Console output
          echo "Security scan completed:"
          echo "  Critical vulnerabilities: $CONTROL_LAYER_CRITICAL"
          echo "  High vulnerabilities: $CONTROL_LAYER_HIGH"

          # Set outputs for metrics reporting
          echo "total_critical=$CONTROL_LAYER_CRITICAL" >> $GITHUB_OUTPUT
          echo "total_high=$CONTROL_LAYER_HIGH" >> $GITHUB_OUTPUT

      - name: Report vulnerability counts to Somnial
        if: always()
        run: |
          # Report high and critical vulnerability counts to Somnial
          CRITICAL="${{ steps.security-scan.outputs.total_critical || '0' }}"
          HIGH="${{ steps.security-scan.outputs.total_high || '0' }}"

          echo "Reporting vulnerability counts to Somnial..."
          echo "  Critical vulnerabilities: ${CRITICAL}"
          echo "  High vulnerabilities: ${HIGH}"

          curl -X POST "https://charts.somnial.co/doubleword-control-layer/critical-vulnerabilities?value=${CRITICAL}" || echo "Failed to report critical vulnerabilities"
          curl -X POST "https://charts.somnial.co/doubleword-control-layer/high-vulnerabilities?value=${HIGH}" || echo "Failed to report high vulnerabilities"

  e2e-test-docker:
    if: (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')) || github.event_name == 'merge_group'
    runs-on: depot-ubuntu-24.04
    needs: build

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v3
        with:
          just-version: "1.46.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Install dashboard dependencies
        working-directory: ./dashboard
        run: pnpm install --frozen-lockfile

      # DISABLED: `npx playwright install chromium` hangs at 100% download due to an upstream
      # Playwright CDN issue (recurs across versions — not resolved by pinning). Safe to skip
      # for now: the docker e2e job runs hurl API tests only; the Playwright E2E block in the
      # justfile is commented out, so no browser is needed. Re-enable (uncomment) once the
      # Playwright CDN download recovers AND the justfile E2E block is restored.
      # - name: Install Playwright browsers
      #   working-directory: ./dashboard
      #   run: npx playwright install chromium --only-shell

      - name: Install hurl
        # Pinned: hurl 8.0.0 (2026-04-27) ships an RFC 9535 JSONPath rewrite
        # that breaks our existing `count` / `nth` patterns on filter results
        # that yield 0 or 1 items (see tests/perms/{models,users,requests,
        # transactions}.hurl and tests/authenticated/admin-crud-group.hurl).
        # Hold at 7.x until the assertions are migrated to RFC 9535 semantics.
        uses: gacts/install-hurl@v1
        with:
          version: 7.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      # Run end to end docker-compose tests
      - name: Run Docker end-to-end tests
        id: e2e-step
        run: |
          # Extract first image from newline-separated list
          IMAGE_LIST="${{ needs.build.outputs.image-tag }}"
          export IMAGE=$(echo "$IMAGE_LIST" | head -n1)
          echo "Using image: $IMAGE"

          START_TIME=$(date +%s)
          just test docker
          END_TIME=$(date +%s)
          E2E_DURATION=$((END_TIME - START_TIME))
          echo "e2e_duration=$E2E_DURATION" >> $GITHUB_OUTPUT
          echo "Docker E2E tests completed in ${E2E_DURATION}s"

          # Report metrics to Somnial
          curl -X POST "https://charts.somnial.co/doubleword-control-layer/e2e-docker-duration?value=${E2E_DURATION}" || true
