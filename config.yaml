# Clay configuration
# This is the default configuration file.

# Server configuration
# To advertise publically, set to "0.0.0.0", or the specific network interface
# you've exposed.
host: "0.0.0.0"
port: 3001

# Base URL where the dashboard is accessible
# Used for password reset links, payment redirect URLs, and batch notification emails
dashboard_url: "http://localhost:5173"

# Onboarding redirect URL for new users (first login)
# When set, users who have never logged in will be redirected here after authentication.
# onboarding_url: "https://onboarding.doubleword.ai"

# Email address where support requests are sent
# support_email: "support@doubleword.ai"

# Database configuration
database:
  # Configure connectivity to an external postgres database here
  type: external
  url: postgres://postgres:password@localhost:5432/dwctl

  # Optional: Read replica URL for read-heavy operations (analytics, config sync)
  # replica_url: postgres://postgres:password@replica:5432/dwctl
  # Can also be set via environment variables (in order of precedence):
  #   DATABASE_REPLICA_URL=postgres://postgres:password@replica:5432/dwctl (recommended)
  #   DWCTL_DATABASE_REPLICA_URL=postgres://postgres:password@replica:5432/dwctl (single underscore)
  # Note: DWCTL_DATABASE__REPLICA_URL (double underscore) won't work due to config structure

  # Main database pool settings for primary (and replica if not specified separately)
  # pool:
  #   max_connections: 10
  #   min_connections: 0
  #   acquire_timeout_secs: 30
  #   idle_timeout_secs: 600
  #   max_lifetime_secs: 1800

  # Optional: Separate pool settings for replica connections
  # If not specified, replica uses the same settings as pool
  # replica_pool:
  #   max_connections: 5  # Typically fewer connections for replicas
  #   min_connections: 0
  #   acquire_timeout_secs: 30
  #   idle_timeout_secs: 600
  #   max_lifetime_secs: 1800

  # We also bundle a copy of postgres with dwctl. It's launched on a random
  # port, and data is stored in $HOME/.dwctl_data/ To have data persist
  # across restarts, set persistent=true.
  # We strongly recommend setting up external postgres in production!
  # type: embedded
  # persistent: true

  # Component databases: fusillade (batch processing) and outlet (request logging)
  # By default, these use separate schemas within the main database.
  # You can optionally configure them to use dedicated databases.

  # Fusillade - batch processing database
  # Default: uses "fusillade" schema in main database (inherits main's replica if configured)
  # fusillade:
  #   mode: schema
  #   name: fusillade
  #   pool:
  #     max_connections: 20
  #     min_connections: 2
  #   # Optional: separate replica pool settings (defaults to pool settings)
  #   # replica_pool:
  #   #   max_connections: 10
  #
  # Alternative: use a dedicated database for fusillade
  # fusillade:
  #   mode: dedicated
  #   url: postgres://postgres:password@localhost:5432/fusillade
  #   replica_url: postgres://postgres:password@replica:5432/fusillade
  #   pool:
  #     max_connections: 20
  #   # Optional: separate replica pool settings (defaults to pool settings)
  #   # replica_pool:
  #   #   max_connections: 10

  # Outlet - request logging database
  # Default: uses "outlet" schema in main database (inherits main's replica if configured)
  # outlet:
  #   mode: schema
  #   name: outlet
  #   pool:
  #     max_connections: 5
  #   # Optional: separate replica pool settings (defaults to pool settings)
  #   # replica_pool:
  #   #   max_connections: 3
  #
  # Alternative: use a dedicated database for outlet
  # outlet:
  #   mode: dedicated
  #   url: postgres://postgres:password@localhost:5432/outlet
  #   pool:
  #     max_connections: 5
  #   # Optional: separate replica pool settings (defaults to pool settings)
  #   # replica_pool:
  #   #   max_connections: 3

# Admin user email - will be created on first startup
admin_email: "test@doubleword.ai"
# TODO: Change this in production!
admin_password: "hunter2"

# Secret key for jwt signing.
# TODO: Change this in production
secret_key: insecure-change-in-production

# Payment configuration
# Dummy provider is enabled by default for testing
# For production, configure Stripe or another provider
payment:
  dummy:
    amount: 100.00

# Model sources - inference endpoints to connect to
# Uncomment and configure as needed
model_sources: []

# Example configurations:
# model_sources:
#   # OpenAI API
#   - name: "openai"
#     url: "https://api.openai.com"
#     api_key: "sk-..."  # Required for model sync
#
#   # Internal model server (no auth required)
#   - name: "internal"
#     url: "http://localhost:8080"

# Frontend metadata
metadata:
  title: "Doubleword Control Layer"
  # region: "UK South"
  # organization: "ACME Corp"
  docs_url: "https://doublewordai.github.io/control-layer/"
  docs_jsonl_url: "https://docs.doubleword.ai/batches/jsonl-files"

# Authentication configuration
auth:
  # Native username/password authentication
  native:
    enabled: true # Enable native login system
    allow_registration: true
    password:
      min_length: 8
      max_length: 64
    session:
      timeout: "24h"
      cookie_name: "dwctl_session"
      cookie_secure: true
      cookie_same_site: "strict"
    password_reset_token_duration: "30m"

  # Proxy header authentication
  # Accepts user identity from HTTP headers set by an upstream authentication proxy
  # (e.g., oauth2-proxy, Vouch, Authentik, Auth0)
  #
  # Two modes:
  #   Single header: Send only header_name with user's email (must be unique)
  #   Dual header: Send both header_name (IdP identifier) and email_header_name (email)
  #                Allows multiple accounts per email from different identity providers
  proxy_header:
    enabled: true

    # header_name: User identifier or email
    # Single header mode: User's email (e.g., "user@example.com")
    # Dual header mode: Unique identifier from IdP (e.g., "github|user123", "google-oauth2|456")
    header_name: "x-doubleword-user"

    # email_header_name: User's email address (optional, enables dual header mode)
    # If provided: Enables federated identity with (email, external_user_id) uniqueness
    # If omitted: Uses header_name value as email (single header mode, email must be unique)
    email_header_name: "x-doubleword-email"

    # auto_create_users: Automatically create users on first login
    auto_create_users: true

  # Default roles assigned to newly created non-admin users
  # Applies to both native user registration and proxy header auto-creation
  # StandardUser role is always guaranteed to be present even if not specified
  # Available roles:
  #   - StandardUser: Required base role for all users (cannot be removed)
  #   - RequestViewer: Read-only access to request logs and analytics
  #   - BillingManager: Full access to credit system and user billing
  #   - BatchAPIUser: Can manage files and batches for batch processing
  # Example: To give all new users request viewing capabilities:
  #   default_user_roles: ["StandardUser", "RequestViewer"]
  default_user_roles: ["StandardUser", "BatchAPIUser"]

  # Security settings
  security:
    jwt_expiry: "1h"
    cors:
      allowed_origins:
        - "http://localhost:5173" # Development frontend (Vite)
        - "http://localhost:3001" # Local control layer
        - "https://localhost" # Local HTTPS
      allow_credentials: true
      max_age: 3600 # Cache preflight requests for 1 hour
      # exposed_headers: []  # Optional: Custom headers to expose to browser (e.g., ["X-Incomplete", "X-Last-Line"])
    # Browser security response headers added to every response (defence in
    # depth — emitted even if a proxy/ingress in front does not add them).
    # Each header is set only if the response does not already carry it.
    headers:
      enabled: true
      frame_options: "DENY" # X-Frame-Options; "" to disable. (X-Content-Type-Options: nosniff is fixed on whenever headers.enabled is true.)
      referrer_policy: "strict-origin-when-cross-origin" # "" to disable
      permissions_policy: "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
      # Opt-in headers (empty = not sent):
      # content_security_policy: "default-src 'self'"  # set a policy that matches your frontend; a wrong policy can break the dashboard
      # content_security_policy_report_only: ""        # roll a CSP out in report-only first
      # strict_transport_security: "max-age=31536000; includeSubDomains"  # usually set on whatever terminates TLS instead

  # Default per-API-key rate limits, applied based on the owning user's
  # `verified` flag (set true after a successful Stripe payment or auto-topup
  # charge). Only used when the api_key has no explicit per-key override.
  # Omit a tier (or the whole `rate_limits` block) to leave that tier
  # unlimited.
  #
  # Both tiers are intentionally left unset: unverified users get full
  # platform throughput — throttling it feels slow/unreliable — and are instead
  # bounded by an upload-*volume* cap until they verify. See
  # `batches.unverified_requests_per_completion_hour` below.
  rate_limits: {}

# Email configuration for password resets and notifications
email:
  # Email transport - either 'file' (for development) or 'smtp' (for production)
  type: file
  path: "./emails" # Directory for file-based email (when type=file)
  # For SMTP (production), use:
  # type: smtp
  # host: "smtp.example.com"
  # port: 587
  # username: "noreply@example.com"
  # password: "your-smtp-password"
  # use_tls: true
# Credits configuration
credits:
  # Initial credits given to standard users when they are created
  # Set to 0 to disable initial credits (users start with no credits)
  # Example: 100.00 gives users 100 credits on registration
  initial_credits_for_standard_users: 0
  # First-payment match promotion: a user's first ever payment (checkout or
  # auto-topup) is matched with bonus credits, up to this amount (in dollars).
  # A first payment below this is matched in full; above it is capped here.
  # Set to 0 to disable. Existing paying customers are never matched (eligibility
  # is derived from whether they have any prior purchase).
  # Example: 50 matches a new user's first $50 of credits.
  first_payment_match_up_to: 0

# Optional feature toggles
enable_metrics: true # Enable Prometheus metrics endpoint
enable_request_logging: true # Enable request/response logging to database
# Note: Environment variables can override top level setting, as long as they're supplied with the DWCTL_ prefix:
# DWCTL_PORT=8080
#
# The exception is DATABASE_URL:
# DATABASE_URL=postgres://prod@db:5432/my_database
#
# For arrays like model_sources, use environment-specific config files
# (e.g., config.production.yaml) rather than env vars.

# Zero-data-retention (ZDR) keystore.
#
# Holds the per-request keys that decrypt ZDR flex request/response bodies. The
# bodies are stored encrypted in Postgres; the keys live here with a TTL, so a
# body becomes permanently unreadable once its key is deleted (on retrieval) or
# expires (crypto-shred). Absent (the default) means ZDR is off and flex bodies
# are stored in plaintext as before. See zdr-flex-encryption-plan.md.
#
# REQUIRED to serve flex requests from zero-data-retention accounts
# (users.zero_data_retention, synced per-key into memory): the flex body is
# encrypted at rest with keys held here. If a ZDR account sends a flex request
# while this section is absent, the request is REJECTED (500) rather than stored
# in plaintext. Non-ZDR flex requests are unaffected. Realtime ZDR needs no
# keystore - it is non-persistence (bodies are suppressed, not encrypted).
#
# Local dev: run `just redis-start`, then uncomment the block below.
keystore:
 # Redis holding the wrapped per-request keys (single instance, AOF on).
 redis_url: "redis://localhost:6379"
 # TTL applied to every stored key. Set it above the longest flex completion
 # window plus a retrieval grace, or in-flight requests self-destruct before
 # they are processed.
 default_ttl_seconds: 7200
 # Which wrap key seals new values; must be an id present in wrap_keys below.
 current_wrap_key_id: "dev-1"
 # Wrap keys by id (each passphrase is run through the KDF). In production
 # these come from a Kubernetes secret; keep retired ids around for one TTL
 # during rotation (see the plan's "Wrap-key rotation"). The dev value below
 # is NOT a secret - never use it outside local dev.
 wrap_keys:
   dev-1: "local-dev-wrap-key-not-a-secret"

# Batches API configuration
batches:
  # Enable batches API endpoints (/files, /batches)
  # When disabled, these endpoints will not be available (default: true)
  enabled: true

  # TTL for batch capacity reservations (seconds)
  reservation_ttl_secs: 600

  # Upload-volume cap for UNVERIFIED creditors, in requests per hour of
  # completion window. The effective cap for a submission scales with
  # its completion window: unverified_requests_per_completion_hour * window_hours
  # (e.g. 1000 for a 1h async window, 24000 for a 24h batch window), measured
  # over a rolling window equal to the completion window. Applies to both batch
  # creation and flex/async submission. Verified creditors are never limited.
  # Over-limit submissions get HTTP 429 with guidance to verify (add a payment
  # method / make a payment). Set to 0 to disable. Default: 1000.
  unverified_requests_per_completion_hour: 1000

  # Optional realtime priority decay window for queue monitoring (seconds).
  # When set, completed FLEX requests within this lookback are included in
  # the 1h pending-request-counts bucket. Omit or set null to disable.
  priority_decay_window_secs: 600
  pending_capacity_counts_enabled: false # Include committed pending requests in batch submission capacity checks (default: false)

  # Allowed completion windows for batch processing
  # These define the maximum time from batch creation to completion
  # Default: ["24h"] - only 24 hour completion window is allowed
  allowed_completion_windows:
    - "24h"
    - "1h"
    # - "12h"  # Uncomment to allow 12 hour
    # - "48h"  # Uncomment to allow 48 hour

  # Async requests configuration
  # Controls the async UI page and which completion window is used for async requests
  async_requests:
    enabled: true
    completion_window: "1h"  # Must be in allowed_completion_windows above

  # Per-window relaxation factors for capacity acceptance.
  # A multiplier on the model's computed capacity for that window.
  #   1.0 (default) = strict, only accept what current throughput supports
  #   1.5           = accept up to 50% more (rely on autoscaling for headroom)
  #   0.0           = block all new batches for this window
  # Keys must be present in allowed_completion_windows.
  # Windows not listed here default to 1.0.
  window_relaxation_factors:
    "1h": 1.0 # strict — no over-acceptance for high priority window
    "24h": 1.25 # 25% over-acceptance — time to provision more capacity

  # Allowed OpenAI-compatible URL paths for batch requests.
  # This is used by both /files upload validation and /batches endpoint validation.
  allowed_url_paths:
    - "/v1/chat/completions"
    - "/v1/completions"
    - "/v1/embeddings"
    - "/v1/responses"
    - "/v1/messages"

  # Files configuration for batch file uploads/downloads
  # NOTE: max_file_size has moved to limits.files.max_file_size
  files:
    upload_buffer_size: 100 # Buffer size for file upload streams (default: 100)
    download_buffer_size: 100 # Buffer size for file download streams (default: 100)
    # Database insertion batch size of request templates for file uploads
    # Higher values improve throughput for large files but use more memory
    # Reduce value if you encounter memory spike issues with many concurrent uploads
    batch_insert_size: 5000

# Resource limits configuration
# Controls file size, request count, and concurrency limits to prevent resource exhaustion
# limits:
#   files:
#     # Maximum file size in bytes (default: 100MB)
#     # Set to 0 for unlimited (not recommended for production)
#     max_file_size: 104857600
#     # Maximum number of requests (JSONL lines) per file
#     # Set to 0 for unlimited (default, not recommended for production)
#     max_requests_per_file: 50000
#     # Maximum concurrent file uploads allowed system-wide
#     # Set to 0 for unlimited (default, not recommended for production)
#     max_concurrent_uploads: 10
#     # Maximum uploads that can wait in queue for a slot
#     # When reached, new uploads receive HTTP 429 immediately
#     # Set to 0 for unlimited waiting queue (not recommended)
#     max_waiting_uploads: 20
#     # Maximum seconds to wait for an upload slot before returning HTTP 429
#     # Set to 0 to reject immediately when no slot is available
#     max_upload_wait_secs: 60
#   requests:
#     # Maximum body size per individual request (bytes). Applies to requests
#     # in batch JSONL files and to realtime request bodies on /ai/v1/*.
#     # Set to 0 for unlimited (not recommended for production)
#     # Default: 10MB (10485760)
#     max_body_size: 10485760

# External data source connections (S3, etc.)
# Allows users to connect external storage and sync files for batch processing.
connections:
  # Encryption key for connection credentials. Any string works (hashed to 32 bytes).
  # Falls back to secret_key if not set. Set independently for production use.
  encryption_key: null
  sync:
    # Default completion window for sync-created batches.
    default_completion_window: "24h"
    # Default endpoint for sync-created batches.
    default_endpoint: "/v1/chat/completions"

# OpenAPI spec exposure controls
# Both surfaces always require authentication when enabled. Disabled
# routes return 404 (not 403) so probes can't tell the route exists.
openapi:
  # Expose /admin/openapi.json and /admin/docs.
  # The Admin spec describes internal management endpoints, so access
  # requires an admin-level identity (PlatformManager role, the admin
  # user, or a platform-purpose API key). Inference sk-* keys are
  # rejected. Set to false to remove the routes entirely.
  # Set via environment: DWCTL_OPENAPI__ADMIN_ENABLED=false
  admin_enabled: true
  # Expose /ai/openapi.json and /ai/docs.
  # The AI surface mirrors the publicly-documented OpenAI API; requires
  # any authenticated identity.
  ai_enabled: true

# Onwards AI proxy configuration
# Controls behavior of the onwards routing layer for AI proxy requests
onwards:
  # Enable strict mode with schema validation and typed handlers.
  # When false (default), all requests are passed through transparently.
  # When true, only known OpenAI API paths are accepted and validated.
  # Set via environment: DWCTL_ONWARDS__STRICT_MODE=true
  strict_mode: false

# Cached-input pricing (the dwctl-owned cache layer)
cache:
  # Enable cached-input pricing. When false (default), the cache layer is not added to
  # the stack: zero request-path overhead, behaviour identical to today. When true, the
  # classifier runs concurrently with the upstream model call under a deadline (so it adds
  # no latency), strips cache_control markers, injects cache_* usage fields, and commits
  # prefix writes on success. Per-model activation is still gated by an active
  # model_cache_tariffs row, so this flag alone does nothing until a model is enabled.
  # Set via environment: DWCTL_CACHE__ENABLED=true
  enabled: false
  # Base URL of the tokenizer-svc (only consulted when enabled). A namespace-relative
  # service name resolves to the tokenizer-svc in the pod's own namespace.
  # Set via environment: DWCTL_CACHE__TOKENIZER_URL=http://tokenizer-svc:8088
  tokenizer_url: http://localhost:8088
  # The cache TTL tiers the platform currently offers (Anthropic-style: "5m", "1h", "24h").
  # A request whose cache_control marker names a tier NOT listed here is rejected with a 400
  # (like an unknown parameter), not silently un-cached, so billing stays honest. Restrict
  # this to roll out a subset (e.g. omit "24h" until the KV-store mechanism exists); a model
  # may still carry a tariff for a disabled tier, it just can't be reached until re-enabled.
  # Set via environment: DWCTL_CACHE__ENABLED_TTLS=5m,1h
  enabled_ttls:
    - 5m
    - 1h
  # The tier a cache_control marker with no explicit ttl defaults to (Anthropic defaults to
  # "5m"). Must be one of enabled_ttls.
  # Set via environment: DWCTL_CACHE__DEFAULT_TTL=5m
  default_ttl: 5m
  # Default pricing multipliers — pre-fill values when enabling caching on a model without
  # explicit per-tier rates. The model_cache_tariffs row is the source of truth, so these
  # only matter at enable-time. Defaults shown; uncomment to override.
  # pricing:
  #   default_write_multiplier_5m: 1.25
  #   default_write_multiplier_1h: 2.0
  #   default_write_multiplier_24h: 2.5
  #   default_read_multiplier: 0.1
  #   default_min_prefix_tokens: 1024

# Background services configuration
# Controls which background services run on this instance
background_services:
  # Onwards config sync - syncs database changes to the AI proxy routing layer
  # Disabling this will prevent the AI proxy from receiving config updates
  onwards_sync:
    enabled: true # Default: true (recommended)
    # Periodic full-resync safety net (milliseconds). LISTEN/NOTIFY propagates real config
    # changes in real time; this fallback only guards against dropped notifications. Each tick
    # triggers a full routing-table reload (heavy DB egress), so keep it in minutes, not seconds.
    # Default: 300000 (5 min). Set to 0 to disable (not recommended).
    fallback_interval_milliseconds: 300000

  # Usage-refresh daemon - incrementally folds new http_analytics rows into the
  # user_model_usage_daily rollup. Woken in-process by the analytics batcher after each
  # flush (no LISTEN/NOTIFY - emitter and consumer share the pod); the fallback tick only
  # backstops a missed nudge or a restart. Cross-pod runs are deduped by an advisory lock.
  usage_refresh:
    enabled: true # Default: true
    # Fallback tick (milliseconds). The batcher nudge drives refreshes under load; this only
    # backstops missed nudges / drains after a restart. Cheap - a tick with no new rows no-ops.
    # Default: 60000 (1 min). Set to 0 to disable.
    fallback_interval_milliseconds: 60000
    # Minimum spacing between refreshes (milliseconds): coalesces bursts of batcher nudges.
    # Default: 30000 (30s).
    min_interval_milliseconds: 30000

  # Probe scheduler - periodically checks inference endpoint health
  # When leader_election is enabled, only runs on the elected leader
  probe_scheduler:
    enabled: true # Default: true

  # Batch processing daemon - processes batch requests asynchronously
  batch_daemon:
    # Controls when the batch processing daemon runs
    # - "always": Run on all instances (default)
    # - "leader": Only run on the elected leader instance
    # - "never": Never run the daemon
    enabled: always
    # Which fusillade claim loops this daemon process runs:
    # - "both": Run request and batch claim loops (default)
    # - "request_only": Run only batchless request claims
    # - "batch_only": Run only batch claims
    mode: both

    # Performance & Concurrency Settings
    claim_batch_size: 100 # Maximum number of requests to claim in each iteration
    default_model_concurrency: 10 # Default concurrent requests per model
    claim_interval_ms: 1000 # Milliseconds to sleep between claim iterations

    # Split claim daemons (fusillade >= 20): batched and batchless (flex) rows
    # are claimed by independent loops. All optional:
    # batch_claim_size: 0            # Max rows per batch-claim iteration; 0 = inherit claim_batch_size
    # batch_claim_batch_size: 4      # Max batches selected per model per iteration (spill-over pool)
    # batch_claim_interval_ms: 0     # Batch-claim loop cadence; 0 = inherit claim_interval_ms
    # batch_claim_require_live: false # Require an explicit `live` model_filters event to batch-claim;
    #                                 # false treats no-event models (external providers) as live
    # claim_ramp_exponent: 0.56      # Deadline-ramp curve: not-live batches become claimable within
    #                                 # window_minutes^exponent minutes of deadline (~59m/24h, ~10m/1h)
    # background_concurrency_limit: 0 # Database-wide per-model ceiling for no-SLA background work;
    #                                 # 0 disables processing, and a nonzero value requires
    #                                 # inject_deadline_priority: true below

    # Retry & Backoff Settings
    # All retry parameters are optional and default to fusillade's built-in defaults
    # min_retries: 3 - Minimum retries guaranteed regardless of other limits
    # max_retries: None - No cap on retries (only limited by deadline if set)
    stop_before_deadline_ms: 0 # When to stop retrying/escalating relative to the batch completion window. Positive means before deadline, negative means after deadline (default: 0, stop on expiration deadline)

    backoff_ms: 1000 # Initial backoff duration in milliseconds
    backoff_factor: 2 # Exponential backoff multiplier
    max_backoff_ms: 10000 # Maximum backoff duration in milliseconds
    additional_retryable_statuses:
      - 499

    # Timeout Settings
    # timeout_ms: 600000 # DEPRECATED: splits into 90% first_chunk_timeout_ms, 10% body_timeout_ms
    first_chunk_timeout_ms: 86400000 # Max time waiting for response headers (24 hours)
    chunk_timeout_ms: 86400000 # Max idle time between response body chunks (24 hours)
    body_timeout_ms: 86400000 # Max total time for entire response body (24 hours)
    # Upload watchdog only covers sending the request body. Keep its stall
    # timeout below first_chunk_timeout_ms so a stalled upload is reported first.
    upload_stall_timeout_ms: 60000 # Max time without upload progress (1 minute)
    upload_chunk_bytes: 65536 # Upload progress granularity (64 KiB)
    upload_stall_poll_ms: 100 # Upload progress check interval (100 ms)
    claim_timeout_ms: 60000 # Max time in "claimed" state before auto-unclaim (1 minute)
    processing_timeout_ms: 600000 # Max time in "processing" state before auto-unclaim (10 minutes)
    pending_request_counts_timeout_ms: 60000 # Statement timeout for pending request count queries (1 minute)

    # Batch archive (fusillade phase 3): moves frozen terminal batches' rows
    # from fusillade.requests into the partitioned batch_requests_archive.
    # BOTH movers ship DISABLED — deploys never move data, only these flags
    # do. Sequencing (load-bearing): flip only once every pod runs
    # location-routing-aware code AND the dwctl version that introduced
    # these keys is the rollback floor (deny_unknown_fields: an older pod
    # parsing a config containing them crash-loops). The daily
    # partition-runway tick always runs on batch-mode daemons regardless of
    # these flags (fusillade_archive_partitions_ahead gauges it).
    # batch_archive_sweep_enabled: false      # Steady-state sweeper: archive newly-frozen batches (oldest-first)
    # batch_archive_sweep_interval_ms: 5000   # Sweep tick cadence (0 disables the worker)
    # batch_archive_sweep_moves_per_tick: 4   # Bounded batch moves per tick, never drain-until-empty
    # batch_archive_sweep_dwell_secs: 0       # Post-freeze dwell before archiving (0 = move immediately)
    # batch_archive_cancel_grace_secs: 600    # Hold batches with in-flight-canceled rows this long so late
    #                                         # billed results can still supersede the cancel on the live row
    # batch_archive_backfill_enabled: false   # Historical drain: same mover, own pacing, oldest-first;
    #                                         # flip off to pause instantly (resumable by construction)
    # batch_archive_backfill_interval_ms: 1000
    # batch_archive_backfill_moves_per_tick: 4
    # batch_archive_backfill_concurrency: 8    # Concurrent moves per tick; the drain-throughput lever
    #                                          # (per-move cost is mostly fixed txn overhead). 1 = sequential
    # batch_archive_partitions_weeks_ahead: 4 # Weekly-partition runway maintained by the daily tick

    # Observability
    status_log_interval_ms: 2000 # Interval for logging daemon status (set to null to disable)

    # SLA Daemon configuration
    # Route-at-claim-time model escalation
    # When a batch is within `escalation_threshold_seconds` of expiry at claim time,
    # the daemon routes requests to a different (typically faster) model.
    # Batch API keys automatically have access to escalation models in the routing cache.
    # model_escalations:
    #   gpt-4:  # Original model
    #     escalation_model: o1-preview  # Route to this model when near expiry
    #     escalation_threshold_seconds: 900  # Default: 900 (15 minutes before expiry)

    # Endpoints that should use SSE streaming for usage tracking.
    # Batch requests to these paths are sent with X-Fusillade-Stream: true,
    # causing the upstream proxy to inject stream: true and stream_options.include_usage.
    # The streamed response is reassembled into non-streaming JSON before storage.
    streamable_endpoints:
      - /v1/chat/completions
      - /v1/completions
      - /v1/responses

    # Inject a deadline-derived priority hint into outbound request bodies at
    # `nvext.agent_hints.priority` (NVIDIA Dynamo's unified priority extension;
    # i32, higher = more important; Dynamo normalizes per backend). The value
    # is the negated Unix timestamp of the batch SLA deadline so earlier
    # deadlines produce larger numbers.
    # inject_deadline_priority: false

  # Batch completion notifications (emails + webhooks)
  # notifications:
  #   poll_interval: 30s                # How often to poll for completed batches
  #   webhooks:
  #     enabled: true
  #     timeout_secs: 30                # HTTP timeout per delivery attempt
  #     circuit_breaker_threshold: 10   # Consecutive failures before auto-disabling
  #     # Retry backoff schedule in seconds. Length = max attempts before exhaustion.
  #     # Default: immediate, 5s, 5m, 30m, 2h, 8h, 24h
  #     retry_schedule_secs: [0, 5, 300, 1800, 7200, 28800, 86400]
  #     claim_batch_size: 50            # Max deliveries claimed from DB per tick
  #     max_concurrent_sends: 20        # Max parallel outbound HTTP requests
  #     channel_capacity: 200           # Internal send/result channel buffer size

  # Leader election - coordinates which instance runs leader-only services
  # When disabled, all instances run as leader (useful for single-instance deployments)
  leader_election:
    enabled: true # Default: true

  # External connection sync workers - process file ingestion and batch activation jobs.
  # Set enabled: false for API-only replicas (jobs queue in Postgres for other replicas).
  sync_workers:
    enabled: true # Default: true
    ingest_workers: 4 # Concurrent file ingestion workers
    activate_workers: 1 # Batch activation workers (low to avoid capacity contention)
    discovery_workers: 1 # Sync discovery workers

# Image input normalisation.
#
# When enabled, image references in `/v1/chat/completions` and
# `/v1/responses` request bodies are routed through a hardened
# content-addressed object store before being forwarded to upstream
# providers. Both HTTP(S) `image_url` values and inline `data:` URIs
# are normalised: each image is fetched (HTTP) or decoded (data URI),
# validated (IP allow-list for HTTP fetches, plus a MIME allow-list
# and size cap for both), uploaded to the store, and replaced in the
# body with a short-lived signed URL.
#
# Defaults are conservative — the feature is off until an operator
# enables it and configures a backend bucket.
image_normalizer:
  enabled: false # Default: false; set to true after configuring a backend
  backend:
    # `memory` (tests / local dev), `gcs`, or `s3_compatible` (production).
    type: memory
    #
    # Google Cloud Storage (Workload Identity — no static keys):
    # type: gcs
    # bucket: doubleword-images
    # region: europe-west4
    #
    # Any S3-compatible store via a custom endpoint (Cloudflare R2, MinIO,
    # Backblaze B2, AWS S3). Credentials are NOT set here — they are read
    # from the environment so they never land in config or a config dump.
    # (Unprefixed, NOT DWCTL_, so the config loader leaves them alone.)
    #   IMAGE_NORMALIZER_S3_ACCESS_KEY_ID
    #   IMAGE_NORMALIZER_S3_SECRET_ACCESS_KEY
    # type: s3_compatible
    # bucket: doubleword-images
    # endpoint_url: https://<account_id>.r2.cloudflarestorage.com
    # region: auto            # R2 uses "auto"; AWS S3 uses e.g. us-east-1
    # force_path_style: true  # required by most S3-compatible endpoints
  fetcher:
    max_bytes: 20971520        # 20 MiB
    timeout_secs: 30
    max_redirects: 3
    max_retries: 3
    retry_base_delay_ms: 250
    allowed_mime:
      - image/png
      - image/jpeg
      - image/webp
      - image/gif
  signing:
    realtime_ttl_secs: 900            # 15 min — covers a chat completion
    # dispatch_ttl_secs: 1800         # Optional override. When omitted,
                                      # derived as
                                      #   processing_timeout_ms (from
                                      #   background_services.batch_daemon)
                                      #   + dispatch_ttl_headroom_secs
                                      # so the URL is always valid for at
                                      # least one full dispatch attempt.
                                      # Each retry gets a brand-new URL.
    dispatch_ttl_headroom_secs: 300   # +5 min on top of processing_timeout
    dashboard_ttl_secs: 300           # 5 min — dashboard image-view path

# NOTE on bucket data lifetime:
#
# This dwctl process never garbage-collects objects from the image
# normaliser bucket — that's a GCS-side concern, configured out-of-band
# via the bucket's Object Lifecycle Management policy
# (Terraform / gcloud).
#
# Recommended lifecycle rule for production:
#
#   age (days)  = max_batch_completion_window + investigation_buffer
#   action      = Delete
#
# Example (covers 24h batches + 6 days of headroom for support / replay):
#
#   gcloud storage buckets update gs://<bucket> --lifecycle-file=- <<EOF
#   {"lifecycle":{"rule":[{"action":{"type":"Delete"},
#                          "condition":{"age":7}}]}}
#   EOF
#
# Tighter retention is fine — the worst-case batch dispatch attempt is
# bounded by background_services.batch_daemon.processing_timeout_ms,
# and dispatch URLs are signed per-attempt. The only constraint is the
# bucket retention MUST exceed the maximum time a batch can sit
# between ingest and final dispatch attempt (typically the batch
# completion window, 24h for OpenAI-style "24h" batches).
